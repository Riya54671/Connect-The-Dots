spring.application.name=backend

# MongoDB
spring.data.mongodb.uri=mongodb://mongodb:27017/hackathon

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password}
minio.bucket=${MINIO_BUCKET:uploads}

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS
allowed.origins=http://localhost:5173